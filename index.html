<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>est_fe13_2st_project</title>
    <meta name="description" content="ROUNZ — 세상을 다르게 보는 방법">
    <link rel="icon" href="/favicon.ico" sizes="any">
    <script type="module" src="./src/js/main.js"></script>
  </head>
  <body data-page="main">
    <header class="site__header"></header>
    <main>
      <section class="hero" aria-labelledby="hero-heading">
        <div class="wrapper">
          <div class="hero__heading">
            <h1 id="hero-heading" class="text-headline-medium">
              ROUNZ — 세상을 다르게 보는 방법
            </h1>
            <p class="text-body-medium">
              안경을 사고 쓰는 일이 즐겨운 경험이 되도록
            </p>
          </div>
          <div class="swiper">
            <div class="swiper-wrapper">
              <!-- Slides -->
              <div class="swiper-slide">
                <img
                  class="hero__image-1"
                  src="/images/2.webp"
                  alt=""
                  fetchpriority="high"
                >
              </div>
              <div class="swiper-slide">
                <img
                  class="hero__image-2"
                  src="/images/3.webp"
                  alt=""
                  loading="lazy"
                >
              </div>
              <div class="swiper-slide">
                <img
                  class="hero__image-3"
                  src="/images/4.webp"
                  alt=""
                  loading="lazy"
                >
              </div>
            </div>
            <!-- If we need pagination -->
            <div class="swiper-pagination"></div>

            <!-- If we need navigation buttons -->
            <div class="swiper-button-prev"></div>
            <div class="swiper-button-next"></div>
          </div>
        </div>
      </section>
      <section class="info" aria-labelledby="info-heading">
        <div class="wrapper">
          <h2 id="info-heading">안내</h2>
          <div class="tabs__container">
            <ul class="tabs__list">
              <li>
                <a id="tab-1" href="#notice" class="tab__buttons">공지</a>
              </li>
              <li>
                <a id="tab-2" href="#event" class="tab__buttons">이벤트</a>
              </li>
              <li>
                <a id="tab-3" href="#faq" class="tab__buttons">FAQ</a>
              </li>
            </ul>
            <div class="tabs__panels">
              <div id="notice" aria-labelledby="tab-1">
                <h3>Lorem, ipsum.</h3>
              </div>
              <div id="event" aria-labelledby="tab-2">
                <h3>Lorem, ipsum dolor.</h3>
              </div>
              <div id="faq" aria-labelledby="tab-3">
                <h3>Lorem ipsum dolor sit.</h3>
              </div>
            </div>
          </div>
        </div>
      </section>
      <section class="main__category" aria-labelledby="main-category-heading">
        <div class="wrapper">
          <h2 id="main-category-heading">카테고리</h2>
        </div>
      </section>
      <section class="main__featured" aria-labelledby="main-featured-heading">
        <div class="wrapper">
          <h2 id="main-featured-heading">추천 컬렉션</h2>
        </div>
      </section>
      <section class="main__brand" aria-labelledby="main-brand-heading">
        <img
          src="/images/main-brand-bg.webp"
          alt=""
          loading="lazy"
          srcset="/images/main-brand-bg-480.webp 480w, /images/main-brand-bg-768.webp 768w, /images/main-brand-bg.webp 1200w"
        >
        <div class="wrapper">
          <h2 id="main-brand-heading">당신의 시선을 완성하다</h2>
          <p>라이프 스타일을 완성하는 프리미엄 안경</p>
          <button type="button">지금 바로 시작하기</button>
        </div>
      </section>
      <section class="main__review" aria-labelledby="main-review-heading">
        <div class="wrapper">
          <h2 id="main-review-heading">후기</h2>
        </div>
      </section>
      <section class="main__cta" aria-labelledby="main-cta-heading">
        <div class="wrapper">
          <h2 id="main-cta-heading">지금 바로 시작하세요</h2>
        </div>
      </section>
    </main>
    <footer class="site__footer"></footer>
  </body>
</html>
