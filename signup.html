<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <meta name="description" content="ROUNZ — 세상을 다르게 보는 방법">
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="stylesheet" href="/src/css/style.css">

    <script type="module" src="/src/js/pages/login.js"></script>
  </head>
  <body data-page="signup">
    <header class="site__header"></header>
    <main class="signup">
      <section class="signup-container">
        <h1 class="text-headline-large">회원가입</h1>
        <p class="text-body-large">ROUNZ 계정을 만들어 시작하세요</p>

        <form class="signup-form">
          <label class="text-title-small">이름</label>
          <input type="text" id="name" placeholder="이름을 입력해주세요">

          <label class="text-title-small">이메일</label>
          <input type="email" id="email" placeholder="이메일을 입력해주세요">
          <label class="text-title-small">비밀번호</label>
          <input
            type="password"
            id="password"
            placeholder="비밀번호를 입력해주세요"
          >
          <label class="text-title-small">비밀번호 확인</label>
          <input
            type="password"
            id="password-confirm"
            placeholder="비밀번호를 다시 입력해주세요"
          >

          <button type="submit" class="signup-btn">회원가입</button>
        </form>

        <p class="text-body-medium">
          이미 계정이 있으신가요?
          <a href="./login.html">로그인</a>
        </p>

        <button
          type="button"
          class="auth__social auth__social--naver"
          onclick="window.open('https://nid.naver.com/user2/join/agree', '_blank')"
        >
          <img
            src="./src/assets/brand/logo_naver.svg"
            alt="Naver Logo"
            width="20"
            height="20"
          >
          네이버로 회원가입
        </button>
        <button
          type="button"
          class="auth__social auth__social--kakao"
          onclick="window.open('https://accounts.kakao.com/weblogin/create_account', '_blank')"
        >
          <img
            src="./src/assets/brand/logo_kakao.svg"
            alt="Kakao Logo"
            width="26"
            height="24"
          >
          카카오로 회원가입
        </button>
      </section>
    </main>
    <footer class="site__footer"></footer>
  </body>
</html>
