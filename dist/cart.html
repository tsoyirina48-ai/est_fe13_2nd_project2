  <body>
    <header class="site__header"></header>
    <main>
      <div class="cart__top">
        <h1>장바구니</h1>
        <p class="cart__count">
          총 <span class="cart__count-value">0</span>개의 상품
        </p>
        <div class="cart__controls">
          <input
            type="checkbox"
            id="select-all"
            class="cart__select-all-checkbox"
          >
          <label for="select-all" class="cart__select-all-label">
            <svg
              aria-hidden="true"
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="lucide lucide-square-check-icon lucide-square-check cart__checkbox-icon cart__checkbox-icon--checked"
            >
              <rect width="18" height="18" x="3" y="3" rx="2" />
              <path d="m9 12 2 2 4-4" />
            </svg>

            <svg
              aria-hidden="true"
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="lucide lucide-square-icon lucide-square cart__checkbox-icon cart__checkbox-icon--unchecked"
            >
              <rect width="18" height="18" x="3" y="3" rx="2" />
            </svg>
          </label>전체 선택

          <button type="button" class="cart__delete-btn">
            <span>
              <svg
                aria-hidden="true"
                xmlns="http://www.w3.org/2000/svg"
                width="14"
                height="14"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="lucide lucide-trash2-icon lucide-trash-2"
              >
                <path d="M10 11v6" />
                <path d="M14 11v6" />
                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6" />
                <path d="M3 6h18" />
                <path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
              </svg>
            </span>선택 삭제
          </button>
        </div>
      </div>
      <div class="cart-layout">
        <div class="cart__product">
          <ul class="cart__list"></ul>
        </div>

        <aside class="cart-summary">
          <!-- <h2>주문 요약</h2> -->
          <p class="cart-summary__product-total">총 상품금액 : 0원</p>
          <p class="cart-summary__shipping">배송비 : 0원</p>
          <hr>
          <strong class="cart-summary__final-total">총 결제금액 : 0원</strong>

          <button type="button" class="cart-summary__purchase-btn">
            구매 결정
          </button>
        </aside>
      </div>

      <section class="recommend">
        <h2>이런 상품은 어떠세요?</h2>
        <ul>
          <li>
            <a href="detail.html?id=1" class="recommend__item">
              <img src="images/2.webp" alt="상품">

          </li>

              <img src="images/3.webp" alt="상품">
            </a>
          </li>
        </ul>
      </section>
    </main>
    <footer class="site__footer"></footer>
  </body>
