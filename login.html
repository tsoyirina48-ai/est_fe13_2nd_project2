<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <meta name="description" content="ROUNZ — 세상을 다르게 보는 방법">
    <link rel="icon" href="/favicon.ico" sizes="any">
    <script type="module" src="/src/js/pages/login.js"></script>
  </head>
  <body data-page="login">
    <header class="site__header"></header>
    <main id="content" class="login">
      <section class="login-container" aria-labelledby="login-heading">
        <h1 id="login-heading" class="text-headline-large">로그인</h1>
        <p class="text-body-large">ROUNZ 계정으로 로그인하세요.</p>

        <form class="login-form" novalidate>
          <div class="auth__field">
            <label for="email" class="text-title-small">이메일</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="이메일을 입력하세요"
              autocomplete="email"
              required
            >
          </div>

          <div class="auth__field">
            <label for="password" class="text-title-small">비밀번호</label>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="비밀번호를 입력하세요"
              autocomplete="current-password"
              required
            >
          </div>

          <button type="submit" class="login-btn">로그인</button>
        </form>

        <p class="auth__link text-body-medium">
          아직 계정이 없으신가요?
          <a href="./signup.html">회원가입</a>
        </p>

        <button
          type="button"
          class="auth__social auth__social--naver"
          onclick="window.open('https://nid.naver.com/nidlogin.login', '_blank', 'noopener')"
        >
          <img
            src="./src/assets/brand/logo_naver.svg"
            alt=""
            width="20"
            height="20"
          >
          네이버로 로그인
        </button>
        <button
          type="button"
          class="auth__social auth__social--kakao"
          onclick="window.open('https://accounts.kakao.com/login/', '_blank', 'noopener')"
        >
          <img
            src="./src/assets/brand/logo_kakao.svg"
            alt=""
            width="26"
            height="24"
          >
          카카오로 로그인
        </button>
      </section>
    </main>
  </body>
</html>
