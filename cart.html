<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>장바구니</title>
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="stylesheet" href="src/css/style.css">
    <link rel="stylesheet" href="src/css/pages/cart.css">
    <script type="module" src="./src/js/pages/cart.js"></script>
  </head>
  <body>
    <header class="site__header"></header>
    <main>
      <h1>장바구니</h1>
      <div class="cart__controls">
        <button type="button" class="cart__select-all-btn">
          <span>
            <svg
              aria-hidden="true"
              xmlns="http://www.w3.org/2000/svg"
              width="14"
              height="14"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="lucide lucide-check-icon lucide-check"
            >
              <path d="M20 6 9 17l-5-5" />
            </svg>
          </span>전체 선택
        </button>
        <button type="button" class="cart__delete-btn">
          <span>
            <svg
              aria-hidden="true"
              xmlns="http://www.w3.org/2000/svg"
              width="14"
              height="14"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="lucide lucide-trash2-icon lucide-trash-2"
            >
              <path d="M10 11v6" />
              <path d="M14 11v6" />
              <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6" />
              <path d="M3 6h18" />
              <path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
            </svg>
          </span>선택 삭제
        </button>
      </div>
      <div class="cart-layout">
        <div class="cart__product">
          <ul>
            <li>
              <article>
                <input
                  type="checkbox"
                  id="product-1"
                  class="cart__checkbox-input"
                >

                <label for="product-1" class="cart__checkbox-label">
                  <svg
                    aria-hidden="true"
                    xmlns="http://www.w3.org/2000/svg"
                    width="24"
                    height="24"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    class="lucide lucide-square-check-icon lucide-square-check cart__checkbox-icon cart__checkbox-icon--checked"
                  >
                    <rect width="18" height="18" x="3" y="3" rx="2" />
                    <path d="m9 12 2 2 4-4" />
                  </svg>

                  <svg
                    aria-hidden="true"
                    xmlns="http://www.w3.org/2000/svg"
                    width="24"
                    height="24"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    class="lucide lucide-square-icon lucide-square cart__checkbox-icon cart__checkbox-icon--unchecked"
                  >
                    <rect width="18" height="18" x="3" y="3" rx="2" />
                  </svg>
                </label>
                <img src="images/3.webp" alt="" class="cart__product-image">
                <div class="cart__product-info">
                  <p class="cart__brand">브랜드</p>

                  <h3>상품 이름</h3>

                  <p class="cart__price">₩000,000</p>
                </div>
                <div class="cart__quantity-control">
                  <button
                    type="button"
                    class="cart__quantity-btn cart__quantity-btn--decrease"
                  >
                    -
                  </button>
                  <span class="cart__quantity"> 1 </span>
                  <button
                    type="button"
                    class="cart__quantity-btn cart__quantity-btn--increase"
                  >
                    +
                  </button>
                </div>
              </article>
            </li>
            <li>
              <article>
                <input
                  type="checkbox"
                  id="product-2"
                  class="cart__checkbox-input"
                >

                <label for="product-2" class="cart__checkbox-label">
                  <svg
                    aria-hidden="true"
                    xmlns="http://www.w3.org/2000/svg"
                    width="24"
                    height="24"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    class="lucide lucide-square-check-icon lucide-square-check cart__checkbox-icon cart__checkbox-icon--checked"
                  >
                    <rect width="18" height="18" x="3" y="3" rx="2" />
                    <path d="m9 12 2 2 4-4" />
                  </svg>

                  <svg
                    aria-hidden="true"
                    xmlns="http://www.w3.org/2000/svg"
                    width="24"
                    height="24"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    class="lucide lucide-square-icon lucide-square cart__checkbox-icon cart__checkbox-icon--unchecked"
                  >
                    <rect width="18" height="18" x="3" y="3" rx="2" />
                  </svg>
                </label>
                <img src="images/3.webp" alt="" class="cart__product-image">
                <div class="cart__product-info">
                  <p class="cart__brand">브랜드</p>

                  <h3>상품 이름</h3>

                  <p class="cart__price">₩000,000</p>
                </div>
                <div class="cart__quantity-control">
                  <button
                    type="button"
                    class="cart__quantity-btn cart__quantity-btn--decrease"
                  >
                    -
                  </button>
                  <span class="cart__quantity"> 1 </span>
                  <button
                    type="button"
                    class="cart__quantity-btn cart__quantity-btn--increase"
                  >
                    +
                  </button>
                </div>
              </article>
            </li>
          </ul>
        </div>

        <aside class="cart-summary">
          <!-- <h2>주문 요약</h2> -->
          <p>총 상품금액 : 999,999원</p>
          <p>배송비 : 0원</p>
          <hr>
          <strong>총 결제금액 : 999,999원</strong>

          <button type="button" class="cart-summary__purchase-btn">
            구매 결정
          </button>
        </aside>
      </div>

      <section class="recommend">
        <h2>이런 상품은 어떠세요?</h2>
        <ul>
          <li>
            <a href="#" class="recommend__item">
              <img src="images/3.webp" alt="상품">
            </a>
          </li>
        </ul>
      </section>
    </main>
    <footer class="site__footer"></footer>
  </body>
</html>
